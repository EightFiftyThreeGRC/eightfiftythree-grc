name: Deploy Supabase email functions

# Deploys branded ISP approver email (Resend + Auth Send Email hook).
# Requires repo secrets: SUPABASE_ACCESS_TOKEN, RESEND_API_KEY

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - 'scripts/configure-supabase-email.mjs'
      - '.github/workflows/deploy-supabase-email.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Deploy functions and enable auth email hook
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ vars.EMAIL_FROM }}
          ENABLE_BRANDED_AUTH_HOOK: ${{ vars.ENABLE_BRANDED_AUTH_HOOK }}
        run: node scripts/configure-supabase-email.mjs
