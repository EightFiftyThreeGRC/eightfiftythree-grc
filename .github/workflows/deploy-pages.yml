# Publishes the static site to GitHub Pages when you push to main.
# Repo setup: Settings → Pages → Build and deployment → Source: GitHub Actions
name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare static site artifact
        run: |
          mkdir -p _site
          cp index.html app.html .nojekyll _site/
          cp -r css js assets _site/
          if [ -d snapshots ]; then cp -r snapshots _site/; fi
          echo "Site files:"
          find _site -type f | head -40
          du -sh _site

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
